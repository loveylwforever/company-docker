# artemis-users.properties
# 格式: username=password (生产环境使用 hash，见下方说明)
#
# 生产环境建议使用 hashed 密码:
#   docker run --rm apache/activemq-artemis:2.40.0-alpine \
#     /opt/activemq-artemis/bin/artemis user add \
#     --user myuser --password mypassword --role admin
#
# 或使用 bcrypt hash (推荐):
#   password 前缀 ENC() 表示加密值
#
admin=ENC(admin_password_here)
producer=ENC(producer_password_here)
consumer=ENC(consumer_password_here)
monitor=ENC(monitor_password_here)
