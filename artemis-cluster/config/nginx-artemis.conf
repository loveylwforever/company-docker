# nginx-artemis.conf — ActiveMQ Artemis 反向代理配置
#
# ============================================================
# 图标显示正常的关键原理:
# ------------------------------------------------------------
# Hawtio (Artemis Web Console) 使用 PatternFly 字体图标，
# 通过相对路径加载 .woff2/.woff/.ttf 等字体文件。
# 
# 常见图标失效原因:
#   1. proxy_pass 路径改写导致字体资源 URL 404
#   2. 缺少 font/* MIME 类型导致浏览器拒绝加载
#   3. CORS 头缺失导致跨域字体请求被浏览器拒绝
#   4. gzip 未覆盖字体文件类型
#
# 解决方案 (已在本配置中实现):
#   ✅ proxy_pass 保持原始路径 (不改写 /console 前缀)
#   ✅ 字体文件单独 location 块，添加 CORS 头 + 长缓存
#   ✅ mime.types 已包含所有字体类型
#   ✅ 禁用 proxy_redirect，避免 Location 头被改写
# ============================================================

upstream artemis_primary {
    server artemis-primary:8161 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream artemis_backup {
    server artemis-backup:8161 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# --- 限速 (防暴力破解登录) ---
limit_req_zone $binary_remote_addr zone=console_login:10m rate=10r/m;

server {
    listen 80;
    server_name _;   # 替换为实际域名，如 artemis.example.com

    # 生产环境建议强制 HTTPS:
    # return 301 https://$host$request_uri;

    # ===================================================
    # 主节点 Web Console
    # 访问: http://<host>/console
    # ===================================================
    location /console {
        proxy_pass         http://artemis_primary;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # 必须: 禁止改写 Location 头，避免重定向循环
        proxy_redirect     off;

        # 超时配置
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # 缓冲
        proxy_buffering        on;
        proxy_buffer_size      8k;
        proxy_buffers          16 64k;

        # -------------------------------------------------------
        # 字体/图标资源缓存 + CORS 头 (关键!)
        # 匹配 .woff .woff2 .ttf .eot .svg 字体文件
        # -------------------------------------------------------
    }

    # 字体文件单独处理 — 添加 CORS 和长期缓存
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        proxy_pass         http://artemis_primary;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection "";
        proxy_redirect     off;

        # 允许字体跨域 (浏览器字体加载需要)
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;

        # 字体资源长期缓存 (版本随 Artemis 升级变化)
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        # 预检请求直接返回
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # SVG 图标缓存
    location ~* \.svg$ {
        proxy_pass         http://artemis_primary;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection "";
        proxy_redirect     off;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # ===================================================
    # Jolokia REST API (JMX 监控)
    # ===================================================
    location /jolokia {
        proxy_pass         http://artemis_primary;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection      "";
        proxy_redirect     off;
    }

    # ===================================================
    # REST API
    # ===================================================
    location /activemq-rest {
        proxy_pass         http://artemis_primary;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection      "";
        proxy_redirect     off;
    }

    # ===================================================
    # 登录接口限速 (防暴力破解)
    # ===================================================
    location = /console/auth/login {
        limit_req zone=console_login burst=5 nodelay;
        proxy_pass         http://artemis_primary;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection "";
        proxy_redirect     off;
    }

    # ===================================================
    # 备节点 Console (通过 /backup 路径访问)
    # ===================================================
    location /backup {
        rewrite ^/backup(/.*)$ $1 break;
        proxy_pass         http://artemis_backup;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection      "";
        proxy_redirect     off;
    }

    # 根路径重定向至 Console
    location = / {
        return 302 /console;
    }

    # 健康检查
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

