# =============================================================================
# ActiveMQ Artemis — 生产级 Docker Compose 部署方案
# 镜像: apache/activemq-artemis (alpine 变体)
# 特性: 主从高可用 / 持久化 / 控制台图标修复 / 监控接口
# =============================================================================

networks:
  artemis-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  artemis-primary-data:
    driver: local
  artemis-backup-data:
    driver: local
  artemis-primary-logs:
    driver: local
  artemis-backup-logs:
    driver: local

services:

  # ---------------------------------------------------------------------------
  # 主节点 (Primary / Live)
  # ---------------------------------------------------------------------------
  artemis-primary:
    image: apache/activemq-artemis:2.40.0-alpine
    container_name: artemis-primary
    hostname: artemis-primary
    user: "root:root"
    restart: unless-stopped
    networks:
      artemis-net:
        ipv4_address: 172.28.0.10

    ports:
      - "61616:61616"   # OpenWire / Core (多协议复用)
      - "5672:5672"     # AMQP
      - "1883:1883"     # MQTT
      - "61613:61613"   # STOMP
      - "8161:8161"     # Web Console / Jolokia / REST API

    environment:
      # ---- 基础账户 ----
      ARTEMIS_USER: admin
      ARTEMIS_PASSWORD: "${ARTEMIS_PASSWORD:-Ch@ngeMe_Prod2026!}"

      # ---- 集群 & HA ----
      ARTEMIS_CLUSTER_PASSWORD: "${ARTEMIS_CLUSTER_PASSWORD:-Cluster@Secret!}"

      # ---- JVM 堆内存 (生产建议 4-8g) ----
      JAVA_OPTS: >-
        -Xms1g -Xmx2g
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/var/lib/artemis-instance/log/heap-dump.hprof
        -Dhawtio.disableProxy=false
        -Dhawtio.realm=activemq
        -Dhawtio.offline=true
        -Dhawtio.rolePrincipalClasses=org.apache.activemq.artemis.spi.core.security.jaas.RolePrincipal

    volumes:
      # 持久化数据
      - ./artemis-primary-data:/var/lib/artemis-instance/data
      - ./artemis-primary-logs:/var/lib/artemis-instance/log

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    healthcheck:
      test: ["CMD", "pgrep", "-f", "artemis"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
        labels: "service=artemis-primary"

  # ---------------------------------------------------------------------------
  # 备节点 (Backup / Passive)  —— 与主节点共享 store 目录实现 shared-store HA
  # 如不需要 HA，注释掉此 service 即可
  # ---------------------------------------------------------------------------
  artemis-backup:
    image: apache/activemq-artemis:2.40.0-alpine
    container_name: artemis-backup
    hostname: artemis-backup
    user: "root:root"
    restart: unless-stopped
    networks:
      artemis-net:
        ipv4_address: 172.28.0.11

    ports:
      - "62616:61616"   # OpenWire (备节点，客户端故障转移用)
      - "8162:8161"     # Web Console 备节点

    environment:
      ARTEMIS_USER: admin
      ARTEMIS_PASSWORD: "${ARTEMIS_PASSWORD:-Ch@ngeMe_Prod2026!}"
      ARTEMIS_CLUSTER_PASSWORD: "${ARTEMIS_CLUSTER_PASSWORD:-Cluster@Secret!}"
      JAVA_OPTS: >-
        -Xms512m -Xmx1g
        -XX:+UseG1GC
        -Dhawtio.disableProxy=false
        -Dhawtio.realm=activemq
        -Dhawtio.offline=true

    volumes:
      - ./artemis-backup-data:/var/lib/artemis-instance/data
      - ./artemis-backup-logs:/var/lib/artemis-instance/log

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    healthcheck:
      test: ["CMD", "pgrep", "-f", "artemis"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

