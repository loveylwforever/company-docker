# 在 company-docker 目录下启动（所有本地挂载均为 ./ 相对本目录）：
#
#   cd company-docker
#   docker compose up -d --build
#
# Java 构建上下文为上级 company-parent；admin-dashboard 为 ../company-admin-dashboard

name: company-stack

services:
  postgres:
    image: postgres:16-alpine
    container_name: company-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres/postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
      - ../company-sql/postgres/schema-company-auth-init-all.sql:/schema/schema-company-auth-init-all.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - company-net

  redis:
    image: redis:8.0-alpine
    container_name: company-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
    command: >
      sh -c 'redis-server
      --requirepass "$$REDIS_PASSWORD"
      --appendonly yes
      --save 60 100
      --protected-mode no'
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./redis/redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - company-net

  artemis:
    image: apache/activemq-artemis:2.42.0-alpine
    container_name: company-artemis
    restart: unless-stopped
    environment:
      ARTEMIS_USER: ${MQ_USERNAME:-admin}
      ARTEMIS_PASSWORD: ${MQ_PASSWORD:-Artemis@2026}
      ARTEMIS_ROLE: admin
      JAVA_OPTS: -Xms512m -Xmx1g -XX:+UseG1GC
      TZ: Asia/Shanghai
    ports:
      - "${ARTEMIS_CONSOLE_PORT:-8161}:8161"
      - "${ARTEMIS_CORE_PORT:-61616}:61616"
      - "${ARTEMIS_AMQP_PORT:-5672}:5672"
    volumes:
      - ./activemq-artemis/artemis-instance:/var/lib/artemis-instance
      - ./activemq-artemis/etc-override:/var/lib/artemis-instance/etc-override:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8161 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s
    networks:
      - company-net

  auth:
    build:
      context: ..
      dockerfile: company-docker/images/company-auth/Dockerfile
    image: company-auth:local
    container_name: company-auth
    restart: unless-stopped
    # 优雅停机宽限期：必须 >= 应用优雅停机耗时(>= MQ reply-timeout-ms 10s + 缓冲)。
    # 它是"最长等待上限"，在途请求排空后会立即停，不会拖慢正常重启。改 SL_MQ_TIMEOUT_MS 时同步调大此值。
    stop_grace_period: ${MQ_STOP_GRACE_PERIOD:-15s}
    # 2c4g 专机（仅 auth+channel）：1g 限额 → MaxRAMPercentage=70 约 716MB 堆，够路由缓存+MQ+Redis
    mem_limit: ${AUTH_MEM_LIMIT:-1g}
    cpus: ${AUTH_CPUS:-0.75}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      artemis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: ${AUTH_SPRING_PROFILES_ACTIVE:-prod}
      LOGGING_FILE_PATH: /var/log/company-auth
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/company_auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      COMPANY_AUTH_REDIS_ADDRESS: redis://redis:6379
      COMPANY_AUTH_REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      COMPANY_AUTH_MQ_BROKER_URL: tcp://artemis:61616
      COMPANY_AUTH_MQ_USERNAME: ${MQ_USERNAME:-admin}
      COMPANY_AUTH_MQ_PASSWORD: ${MQ_PASSWORD:-Artemis@2026}
      FAIL_INSERT_TRANS_INFO_DIR: /var/lib/company-auth/fail-insert-trans-info
      CHANNEL_PLUGIN_HOME: /opt/channel-plugin
      JAVA_TOOL_OPTIONS: ${AUTH_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=40 -XX:+ExitOnOutOfMemoryError}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/tools/ping >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    ports:
      - "${AUTH_PORT:-8080}:8080"
    volumes:
      - ./company-auth/fail-insert:/var/lib/company-auth/fail-insert-trans-info
      - ./company-auth/logs:/var/log/company-auth
      - ../tools/channel-plugin:/opt/channel-plugin
    networks:
      - company-net

  auth-channel:
    build:
      context: ..
      dockerfile: company-docker/images/company-auth-channel/Dockerfile
    image: company-auth-channel:local
    container_name: company-auth-channel
    restart: unless-stopped
    # 同 auth：宽限期需覆盖 worker 排空已出队请求 + 关 JMS 的总耗时（MqWorker 内部上限 < 此值）
    stop_grace_period: ${MQ_STOP_GRACE_PERIOD:-15s}
    # 2c4g 专机：2.5g 限额 → MaxRAMPercentage=75 约 1.9GB 堆，供插件 ClassLoader + 消费线程
    mem_limit: ${CHANNEL_MEM_LIMIT:-2560m}
    cpus: ${CHANNEL_CPUS:-1.25}
    depends_on:
      postgres:
        condition: service_healthy
      artemis:
        condition: service_healthy
      auth:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: ${CHANNEL_SPRING_PROFILES_ACTIVE:-prod}
      LOGGING_FILE_PATH: /var/log/company-auth-channel
      SERVER_PORT: "8090"
      CHANNEL_DB_URL: jdbc:postgresql://postgres:5432/company_auth
      CHANNEL_DB_USER: postgres
      CHANNEL_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      MQ_BROKER_URL: tcp://artemis:61616
      MQ_USERNAME: ${MQ_USERNAME:-admin}
      MQ_PASSWORD: ${MQ_PASSWORD:-Artemis@2026}
      CHANNEL_PLUGIN_ARTIFACT_BASE_DIR: /data/plugins
      JAVA_TOOL_OPTIONS: ${CHANNEL_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75 -XX:InitialRAMPercentage=50 -XX:+ExitOnOutOfMemoryError -XX:MaxMetaspaceSize=384m}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/tools/channel/ping >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    ports:
      - "${AUTH_CHANNEL_PORT:-8090}:8090"
    volumes:
      - ./company-auth-channel/plugins:/data/plugins
      - ./company-auth-channel/logs:/var/log/company-auth-channel
    networks:
      - company-net

  manage:
    build:
      context: ..
      dockerfile: company-docker/images/company-manage/Dockerfile
    image: company-manage:local
    container_name: company-manage
    restart: unless-stopped
    mem_limit: ${MANAGE_MEM_LIMIT:-768m}
    cpus: ${MANAGE_CPUS:-0.5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: ${MANAGE_SPRING_PROFILES_ACTIVE:-prod}
      MANAGE_DB_URL: jdbc:postgresql://postgres:5432/company_auth?currentSchema=manage
      MANAGE_DB_USER: postgres
      MANAGE_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      MANAGE_REDIS_HOST: redis
      MANAGE_REDIS_PORT: "6379"
      MANAGE_REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      MANAGE_REDIS_DATABASE: "1"
      SECURITY_DEV_INIT_ADMIN: "true"
      AUTH_API_BASE: ${AUTH_API_BASE:-http://auth:8080}
      JAVA_TOOL_OPTIONS: ${MANAGE_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=40 -XX:+ExitOnOutOfMemoryError}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8088/tools/ping >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    ports:
      - "${COMPANY_MANAGE_PORT:-8088}:8088"
    volumes:
      - ./company-manage/logs:/var/log/company-manage
    networks:
      - company-net

  admin-dashboard:
    build:
      context: ..
      dockerfile: company-docker/images/admin-dashboard/Dockerfile
      args:
        NODE_HEAP_MB: ${NODE_HEAP_MB:-2048}
    image: admin-dashboard:local
    container_name: company-admin-dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_healthy
      auth-channel:
        condition: service_healthy
      manage:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      HOST: 0.0.0.0
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/company_auth
      AUTH_API_BASE: ${AUTH_API_BASE:-http://auth:8080}
      CHANNEL_RELEASE_API_BASE: ${CHANNEL_RELEASE_API_BASE:-http://auth-channel:8090}
      MANAGE_API_BASE: http://manage:8088
      MANAGE_ENCRYPT_KEY: 1024lab__1024lab
    ports:
      - "${ADMIN_DASHBOARD_PORT:-3000}:3000"
    networks:
      - company-net

networks:
  company-net:
    driver: bridge
